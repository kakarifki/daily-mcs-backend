services:
  app:
    build: .
    image: daily-mcs-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_KEY: ${API_KEY}
      # DATABASE_URL harus di-set eksplisit sebagai env var.
      # Lokal: di .env (host = "db" karena ada service db di override).
      # Coolify: di Environment Variables UI (host = nama service Postgres
      #          di Coolify, biasanya "postgresql-xxxxxx" — cek di tab
      #          "Connection" Postgres resource-mu).
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_DIR: /app/storage/uploads
      OUTPUT_DIR: /app/storage/outputs
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
    expose:
      - "3000"
    volumes:
      - app_storage:/app/storage

volumes:
  app_storage:
